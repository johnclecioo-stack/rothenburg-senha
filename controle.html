<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle - Rothenburg</title>
<style>
body{margin:0;background:#111;color:white;font-family:Arial;display:grid;place-items:center;min-height:100vh}
.box{width:90%;max-width:430px;background:#1c1c1c;padding:30px;border-radius:20px;border:3px solid #e30613;text-align:center}
h1{color:#e30613}
input{width:100%;font-size:90px;text-align:center;padding:15px;border-radius:15px;border:0;margin:25px 0}
button{width:100%;padding:18px;margin-top:12px;border:0;border-radius:12px;font-size:20px;font-weight:bold}
.chamar{background:#e30613;color:white}
.prox{background:white;color:#111}
.limpar{background:#333;color:white}
.atual{font-size:46px;font-weight:900;margin-top:20px}
#ultimasControle{
    margin-top:20px;
    color:white;
    font-size:22px;
    font-weight:bold;
    text-align:center;
    line-height:1.8;
}
</style>
</head>
<body>
<div class="box">
<h1>ROTHENBURG</h1>
<p>Painel de Controle</p>
<input id="senha" placeholder="97">
<button class="chamar" onclick="chamar()">CHAMAR PRONTO</button>
<button class="prox" onclick="proxima()">PRÓXIMA NUMÉRICA</button>
<button class="chamar" onclick="repetir()">REPETIR CHAMADA</button>
<button class="limpar" onclick="limpar()">LIMPAR</button>
<div>Atual:</div>
<div class="atual" id="atual">--</div>
</div>
<div id="ultimasControle"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAO-sbi-tDBsTv6OYwLHC6TkgfYZ6gQ1yM",
authDomain: "rothenburg-senha.firebaseapp.com",
databaseURL: "https://rothenburg-senha-default-rtdb.firebaseio.com",
projectId: "rothenburg-senha",
storageBucket: "rothenburg-senha.firebasestorage.app",
messagingSenderId: "760034845391",
appId: "1:760034845391:web:0560790d326324505fcdba"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const refPainel = ref(db,"painelSenha");

let estado={senhaAtual:"--",historico:[],contador:0,ultimaChamada:Date.now()};

onValue(refPainel,s=>{
if(s.exists())estado=s.val();
document.getElementById("atual").textContent=estado.senhaAtual||"--";
});
document.getElementById("ultimasControle").innerHTML =
    (estado.historico || [])
    .slice(0,5)
    .map((s,i)=> `${i+1}º - ${s}`)
    .join("<br>");
function salvar(nova){
let hist=estado.historico||[];
if(estado.senhaAtual && estado.senhaAtual!=="--") hist.unshift(estado.senhaAtual);
hist=hist.slice(0,5);
let num=parseInt(nova,10);
set(refPainel,{
senhaAtual:nova,
historico:hist,
contador:isNaN(num)?estado.contador:num,
ultimaChamada:Date.now()
});
}

window.chamar=function(){
    let v=document.getElementById("senha").value.trim();

    if(!v){
        v=String((estado.contador || 0)+1).padStart(2,"0");
    }

    salvar(v);

    document.getElementById("senha").value=
    String((estado.contador || 0)+1).padStart(2,"0");
}
window.proxima=function(){
let p=Number(estado.contador||0)+1;

document.getElementById("senha").value=
String(p).padStart(2,"0");
}

window.repetir=function(){
set(refPainel,{...estado,ultimaChamada:Date.now()});
}

window.limpar=function(){
set(refPainel,{senhaAtual:"--",historico:[],contador:0,ultimaChamada:Date.now()});
}
</script>
</body>
</html>
