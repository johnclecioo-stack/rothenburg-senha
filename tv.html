<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV - Rothenburg</title>
<style>
*{box-sizing:border-box}
body{
    margin:0;
    background:#000;
    font-family:Arial;
    color:#111;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.screen{
    width:100vw;
    height:100vh;
    margin:0;
    background:#fff;
    overflow:hidden;
    position:relative;
}
.top{
    height:240px;
    background:#050505;
    border-bottom:5px solid #e30613;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:visible;
    position:relative;
}
.logo-img{
    height:700px;
    width:auto;
    position:absolute;
    top:-150px;
    left:50%;
    transform:translateX(-50%);
    z-index:100;
}
.main{
    display:grid;
    grid-template-columns:38% 62%;
    height:calc(100vh - 205px);
    padding:70px 65px 0 65px;
}

.left{
    border-right:4px solid #e30613;
    padding-right:45px;
    padding-left:35px;
}

.right{
    text-align:center;
    padding-left:65px;
    padding-top:0px;
}
.title{
    background:#e30613;
    color:white;
    font-size:52px;
    font-weight:900;
    text-align:center;
    border-radius:12px;
    padding:22px 10px;
    width:95%;
    margin:0 auto 20px auto;
}
.item{
    display:grid;
    grid-template-columns:90px 1fr;
    height:78px;
    margin-top:12px;
    border:2px solid #ddd;
    border-radius:8px;
    overflow:hidden;
    align-items:center;
    background:white;
}

.rank{
    background:#e30613;
    color:white;
    font-size:38px;
    font-weight:900;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100%;
}

.num{
    font-size:80px;
    font-weight:900;
    color:#333;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100%;
}
.right{text-align:center}
.pronto{
    background:#e30613;
    color:white;
    font-size:100px;
    font-weight:900;
    padding:26px;
    border-radius:17px;
    margin:0 auto 25px auto;
    width:95%;
}

.label{
    font-size:44px;
    font-weight:900;
    margin-top:15px;
}

.atual{
    font-size:320px;
    font-weight:900;
    color:#e30613;
    line-height:1;
}
.footer{
    height:75px;
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    background:#050505;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 35px;
    font-size:34px;
    font-weight:700;
}
.flash{animation:flash .6s ease-in-out 3}
@keyframes flash{50%{transform:scale(1.08)}}
</style>
</head>
<body>
<div class="screen">
<div class="top">
 <img class="logo-img" src="logo.png" alt="Rothenburg Express">
</div>
<div class="main">
<div class="left">
<div class="title">ÚLTIMAS CHAMADAS</div>
<div id="historico"></div>
</div>
<div class="right">
<div class="pronto">PRONTO</div>
<div class="label">ÚLTIMA CHAMADA</div>
<div class="atual" id="senhaAtual">--</div>
</div>
</div>
<div class="footer">
    <div>23/06/2026</div>

    <div class="instagram">
        📷 @rothenburgoficial
    </div>

    <div>🔊 SOM ATIVO</div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAO-sbi-tDBsTv6OYwLHC6TkgfYZ6gQ1yM",
authDomain: "rothenburg-senha.firebaseapp.com",
databaseURL: "https://rothenburg-senha-default-rtdb.firebaseio.com",
projectId: "rothenburg-senha",
storageBucket: "rothenburg-senha.firebasestorage.app",
messagingSenderId: "760034845391",
appId: "1:760034845391:web:0560790d326324505fcdba"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let ultimaChamada = null;

function som(){
const ctx=new AudioContext();
const gain=ctx.createGain();
gain.gain.value=.25;
gain.connect(ctx.destination);
[750,980].forEach((f,i)=>{
const o=ctx.createOscillator();
o.frequency.value=f;
o.connect(gain);
o.start(ctx.currentTime+i*.18);
o.stop(ctx.currentTime+i*.18+.15);
});
}

function render(d){
document.getElementById("senhaAtual").textContent=d.senhaAtual||"--";
const hist=d.historico||[];
document.getElementById("historico").innerHTML="";
for(let i=0;i<5;i++){
document.getElementById("historico").innerHTML+=`
<div class="item">
<div class="rank">${5-i}º</div>
<div class="num">${hist[i]||"--"}</div>
</div>`;
}
if(ultimaChamada && d.ultimaChamada!==ultimaChamada){
som();
document.getElementById("senhaAtual").classList.remove("flash");
void document.getElementById("senhaAtual").offsetWidth;
document.getElementById("senhaAtual").classList.add("flash");
}
ultimaChamada=d.ultimaChamada;
}
onValue(ref(db,"painelSenha"),s=>{if(s.exists())render(s.val())});

setInterval(()=>{
const a=new Date();
document.getElementById("data").textContent=a.toLocaleDateString("pt-BR");
document.getElementById("hora").textContent=a.toLocaleTimeString("pt-BR");
},1000);
</script>
</body>
</html>
